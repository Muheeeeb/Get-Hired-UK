services:
  db:
    image: postgres:16-alpine
    container_name: gethired_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gethired
      POSTGRES_PASSWORD: gethired_dev_pw
      POSTGRES_DB: gethired
    ports:
      - "5432:5432"
    volumes:
      - gethired_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gethired -d gethired"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  gethired_pgdata:
